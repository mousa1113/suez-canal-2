<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Cable Measurement Inspection Form</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<style>
  :root{
    --blue:#1a3fa0;
    --olive:#9aa06a;
    --border:#000;
    --warn:#c0392b;
    --warn-bg:#f5c6c0;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:'Times New Roman', Times, serif;
    background:#dcdcdc;
    padding:20px;
  }
  .toolbar{
    max-width:780px;margin:0 auto 12px;
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    font-family:Arial, sans-serif;
  }
  .toolbar button{
    font-size:12px;font-weight:bold;padding:7px 14px;
    border:1px solid #333;background:#fff;cursor:pointer;border-radius:2px;
  }
  .toolbar button:hover{background:#eee;}
  .toolbar button:disabled{opacity:.5;cursor:not-allowed;}
  .toolbar .grp{display:flex;gap:4px;align-items:center;border:1px solid #bbb;border-radius:3px;padding:3px 6px;background:#fff;}
  .toolbar .grp span{font-size:11px;font-weight:bold;color:#333;}
  .toolbar input[type=color]{width:30px;height:28px;border:1px solid #333;padding:0;cursor:pointer;}

  #pages{max-width:780px;margin:0 auto;}

  .sheet{
    background:#fff;
    border:3px solid var(--border);
    padding:10px;
    margin-bottom:22px;
    position:relative;
  }
  .sheet .delpage{
    position:absolute; top:6px; right:6px; z-index:5;
    font-family:Arial,sans-serif; font-size:11px; font-weight:bold;
    background:#fff; border:1px solid var(--warn); color:var(--warn);
    padding:4px 9px; border-radius:2px; cursor:pointer;
  }
  .sheet .delpage:hover{background:var(--warn); color:#fff;}

  table{border-collapse:collapse; width:100%;}
  td, th{border:1.5px solid var(--border); padding:3px 6px; font-size:11.5px;}

  .headtable{border:1.5px solid var(--border);}
  .headtable td{border:none; padding:3px 6px; vertical-align:middle;}
  .headtable td.titles{border-left:1.5px solid var(--border); border-right:1.5px solid var(--border);}
  .logo-cell{width:118px; text-align:center;}
  .logo-box{
    width:106px;height:66px;
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:bold;color:var(--blue);margin:0 auto;
    font-family:Arial, sans-serif; text-align:center; line-height:1.1;
    overflow:visible;
  }
  .header-divider{height:4px; background:#000; margin-top:4px;}
  .logo-fixed img{width:100%;height:100%;object-fit:contain;}
  .logo-fallback{display:none;width:100%;height:100%;align-items:center;justify-content:center;
    text-align:center;font-size:9px;font-weight:bold;color:var(--blue);font-family:Arial,sans-serif;line-height:1.1;}
  .titles{text-align:center;}
  .titles .t1{color:var(--blue); font-weight:bold; font-size:17px; letter-spacing:.5px;}
  .titles .t2{color:#000; font-weight:bold; font-size:12.5px; margin-top:2px;}
  .titles .t3{color:var(--blue); font-weight:bold; font-size:15px; margin-top:4px;}
  .titles .t4{font-weight:bold; font-size:12.5px; margin-top:2px;}

  .infobar{width:100%; border-collapse:collapse; margin-top:0;}
  .infobar td{border:1.5px solid var(--border); font-size:14px; padding:6px 8px; font-weight:bold;}
  .infobar b{font-weight:bold;}
  .infobar input.pscode{width:34px; text-align:center; font-weight:bold; font-size:14px;}
  .infobar input, .diagrambar input{border:none; font-family:'Times New Roman', Times, serif; background:transparent;}

  .diagrambar{width:100%; border-collapse:collapse;}
  .diagrambar td{border:1.5px solid var(--border); padding:6px 8px; vertical-align:top; font-size:11px;}
  .diagram-title{font-weight:bold; font-size:11px; margin-bottom:4px;}

  .mp-header{
    text-align:center; font-weight:bold; background:#fff;
    border:1.5px solid var(--border); padding:4px; font-size:12px;
  }
  .cross-img{display:block; margin:2px auto; height:42px; width:auto;}
  .linkbody-row{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .linkbody-img{height:28px; width:auto; flex:none;}
  .linkbody-info{font-size:11px; white-space:nowrap;}

  .table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .maintable{width:100%; min-width:640px;}
  .maintable th{ background:#fff; font-weight:bold; text-align:center; font-size:11px; padding:3px 2px; }
  .maintable th.th-tint{ background:#e2e6d3; }
  .maintable td.rowlabel{ font-size:10.5px; font-weight:bold; width:55px; text-align:center; background:#fff; }
  .maintable th.partition{ width:32px; font-size:14px; text-align:center; vertical-align:middle; background:#fff; }
  .maintable td input.cell{
    width:100%; border:none; text-align:center; font-size:11px; height:22px; background:transparent;
    font-family:'Times New Roman', Times, serif;
  }
  .maintable td input.cell:focus{outline:1.5px solid var(--blue);}
  .maintable td.calc{ background:var(--olive); text-align:center; font-weight:bold; font-size:11px; color:#111; }
  .maintable tr.partition-start td, .maintable tr.partition-start th{border-top:3px solid var(--border);}
  .maintable tr.partition-end td{border-bottom:2.5px solid var(--border);}
  .maintable td.dimin.warn{background:var(--warn-bg); color:var(--warn);}

  .remarks{border:1.5px solid var(--border); border-top:none; padding:6px 8px; font-size:11px;}
  .remarks .lbl{font-weight:bold; text-decoration:underline;}
  .remarks textarea{
    width:100%; border:none; font-family:'Times New Roman', Times, serif; font-size:11px;
    resize:vertical; min-height:34px; margin-top:2px; background:transparent;
  }

  .bottomtable{width:100%; border-collapse:collapse;}
  .bottomtable td{border:1.5px solid var(--border); font-size:9px; padding:0.5px 5px; vertical-align:top; line-height:1.05;}
  .bottomtable b{font-weight:bold;}
  .bottomtable input.inline{border:none; font-family:'Times New Roman', Times, serif; font-size:9px; width:120px; background:transparent;}
  .accept-cell{text-align:center;}
  .accept-cell label{display:inline-flex; align-items:center; gap:4px; font-size:9px;}

  .sigrow td{padding:0.5px 5px;}
  .sigrow .siglabel{font-weight:bold; width:90px;}
  .sigrow input.sig{border:none; font-family:'Times New Roman', Times, serif; font-size:9px; width:100%; background:transparent;}

  .revtable{width:100%; border-collapse:collapse;}
  .revtable td{border:1.5px solid var(--border); font-size:8px; text-align:center; padding:1px;}

  @media (max-width:600px){
    body{padding:8px;}
    .toolbar{gap:6px;}
    .toolbar button{flex:1 1 auto; padding:9px 8px; font-size:12px;}
    .sheet{padding:6px;}
    .logo-cell{width:74px;}
    .logo-box{width:66px; height:42px;}
    .titles .t1{font-size:12px;}
    .titles .t3{font-size:11px;}
    .diagrambar{display:block;}
    .diagrambar tr{display:flex; flex-direction:column;}
    .diagrambar td{display:block; width:100%!important; border-bottom:none;}
    .diagrambar td:first-child{border-bottom:1.5px solid var(--border);}
    .bottomtable, .bottomtable tbody, .bottomtable tr{display:block; width:100%;}
    .bottomtable td{display:block; width:100%!important;}
    .bottomtable tr{border:1.5px solid var(--border); margin-bottom:-1.5px;}
    .bottomtable tr td{border:none; border-bottom:1px solid #ddd;}
    .revtable, .revtable tr{display:flex; flex-wrap:wrap;}
    .revtable td{flex:1 1 100%;}
  }

  @media print{
    html, body{background:#fff; padding:0; margin:0; height:auto;}
    *{-webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; color-adjust:exact !important;}
    .toolbar, p{display:none !important;}
    .sheet{border:2px solid #000; margin:0; padding:4px; page-break-after:always; page-break-inside:avoid; box-shadow:none;}
    .sheet:last-child{page-break-after:auto;}
    .sheet .delpage{display:none;}
    #pages{max-width:100%;}
    table, td, th{font-size:10.5px !important; padding:2px 4px !important; line-height:1.15 !important;}
    .infobar td{font-size:12px !important; padding:3px 6px !important;}
    .diagrambar td{padding:2px 4px !important;}
    .cross-img{height:26px !important; margin:1px auto !important;}
    .linkbody-img{height:17px !important;}
    .linkbody-row{gap:8px !important;}
    .diagram-title{font-size:9px !important; margin-bottom:1px !important;}
    .diagrambar div[style]{font-size:10px !important;}
    .maintable td input.cell{height:15px !important; font-size:10px !important;}
    .maintable th{padding:2px !important; font-size:9.5px !important;}
    .maintable td.rowlabel{font-size:9px !important;}
    .remarks{padding:2px 6px !important;}
    .remarks textarea{min-height:22px !important; font-size:9.5px !important;}
    .bottomtable td{padding:0.5px 5px !important; font-size:8.5px !important;}
    .sigrow td{padding:0.5px 5px !important;}
    .revtable td{font-size:7.5px !important; padding:1px !important;}
    .titles .t1{font-size:14px !important;}
    .titles .t2{font-size:10.5px !important;}
    .titles .t3{font-size:12px !important;}
    .titles .t4{font-size:10.5px !important;}
    .logo-cell{width:96px !important;}
    .logo-box{width:88px !important; height:56px !important; font-size:7px !important;}
    .header-divider{height:2.5px !important; margin-top:2px !important;}
    @page{ size:A4; margin:6mm; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="recalcAllSheets()">إعادة حساب</button>
  <button id="btnSaveImg" onclick="saveAsImage()">حفظ كصورة</button>
  <button id="btnSavePdf" onclick="saveAsPDF()">حفظ PDF</button>
  <button onclick="window.print()">طباعة</button>
  <button onclick="clearAllSheets()">مسح الكل</button>
  <button onclick="addPage()">+ إضافة صفحة</button>
</div>
<div id="exportOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;align-items:center;justify-content:center;font-family:Arial,sans-serif;">
  <div style="background:#fff;padding:18px 22px;border-radius:8px;font-size:13px;font-weight:bold;color:#333;box-shadow:0 6px 20px rgba(0,0,0,.3);">
    جاري تجهيز الملف، من فضلك انتظر...
  </div>
</div>
<p style="max-width:780px;margin:0 auto 10px;font-family:Arial,sans-serif;font-size:11px;color:#555;">
  اضغط كليك يمين (أو اضغط مطولاً على الموبايل) على أي جزء في الفورم لتكبير/تصغير الخط أو تغيير لونه بشكل مستقل.
</p>

<div id="pages"></div>

<script>
/* ---- per-element right-click edit menu (font size + color) ---- */
let menuTarget = null;
let pressTimer = null;

function closeEditMenu(){
  const m = document.getElementById('editMenu');
  if(m) m.remove();
  menuTarget = null;
}

function openEditMenu(target, x, y){
  closeEditMenu();
  menuTarget = target;
  const menu = document.createElement('div');
  menu.id = 'editMenu';
  menu.style.cssText = `position:fixed;top:${y}px;left:${x}px;z-index:9999;background:#fff;border:1px solid #333;
    border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.25);padding:8px;font-family:Arial,sans-serif;font-size:12px;
    display:flex;flex-direction:column;gap:6px;min-width:150px;`;
  menu.innerHTML = `
    <div style="font-weight:bold;color:#333;">تعديل هذا العنصر</div>
    <div style="display:flex;gap:6px;">
      <button type="button" style="flex:1;padding:5px;font-weight:bold;" data-act="dec">A-</button>
      <button type="button" style="flex:1;padding:5px;font-weight:bold;" data-act="inc">A+</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span>اللون</span>
      <input type="color" data-act="color" value="#000000" style="flex:1;height:28px;cursor:pointer;">
    </div>
    <button type="button" data-act="reset" style="padding:5px;">استرجاع الافتراضي</button>
    <button type="button" data-act="close" style="padding:5px;color:#c0392b;">إغلاق</button>
  `;
  document.body.appendChild(menu);

  const rect = menu.getBoundingClientRect();
  if(rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 10) + 'px';
  if(rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 10) + 'px';

  menu.querySelector('[data-act="inc"]').onclick = ()=> bumpFont(target, 1);
  menu.querySelector('[data-act="dec"]').onclick = ()=> bumpFont(target, -1);
  menu.querySelector('[data-act="color"]').oninput = (e)=>{ target.style.color = e.target.value; };
  menu.querySelector('[data-act="reset"]').onclick = ()=>{ target.style.fontSize=''; target.style.color=''; closeEditMenu(); };
  menu.querySelector('[data-act="close"]').onclick = closeEditMenu;
}

function bumpFont(target, dir){
  const current = parseFloat(getComputedStyle(target).fontSize);
  const next = Math.max(7, Math.min(40, current + dir));
  target.style.fontSize = next + 'px';
}

document.addEventListener('contextmenu', function(e){
  const el = e.target.closest('.sheet input, .sheet textarea, .sheet td, .sheet th, .sheet b, .sheet div.t1, .sheet div.t2, .sheet div.t3, .sheet div.t4, .sheet .diagram-title, .sheet label, .sheet span');
  if(el){
    e.preventDefault();
    openEditMenu(el, e.clientX, e.clientY);
  }
});

let touchTimer = null;
document.addEventListener('touchstart', function(e){
  const el = e.target.closest('.sheet input, .sheet textarea, .sheet td, .sheet th, .sheet b, .sheet div.t1, .sheet div.t2, .sheet div.t3, .sheet div.t4, .sheet .diagram-title, .sheet label, .sheet span');
  if(!el) return;
  touchTimer = setTimeout(()=>{
    const t = e.touches[0];
    openEditMenu(el, t.clientX, t.clientY);
  }, 550);
}, {passive:true});
document.addEventListener('touchend', ()=> clearTimeout(touchTimer));
document.addEventListener('touchmove', ()=> clearTimeout(touchTimer));

document.addEventListener('click', function(e){
  if(!e.target.closest('#editMenu')) closeEditMenu();
});

/* ---- logo upload ---- */
function triggerLogoUpload(el){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = ()=>{
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      el.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:contain;">`;
      scheduleAutosave();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

const ROWS_PER_PARTITION = ['First','Second','Third'];
const PARTITIONS = 12;

function buildTable(sheet){
  const tbody = sheet.querySelector('.tbody');
  tbody.innerHTML = '';
  for(let p=1; p<=PARTITIONS; p++){
    ROWS_PER_PARTITION.forEach((label, idx) => {
      const tr = document.createElement('tr');
      if(idx===0) tr.classList.add('partition-start');
      if(idx===2) tr.classList.add('partition-end');
      let html = '';
      if(idx===0){
        html += `<th class="partition" rowspan="3">${p}</th>`;
      }
      html += `<td class="rowlabel">${label}</td>`;
      for(let pt=1; pt<=3; pt++){
        html += `<td><input class="cell" data-p="${p}" data-r="${idx}" data-pt="${pt}" data-f="A" oninput="onCell(this)"></td>`;
        html += `<td><input class="cell" data-p="${p}" data-r="${idx}" data-pt="${pt}" data-f="B" oninput="onCell(this)"></td>`;
        html += `<td class="calc avgcell" data-key="avg-${p}-${idx}-${pt}"></td>`;
      }
      html += `<td class="calc totalcell" data-key="total-${p}-${idx}"></td>`;
      html += `<td class="calc dimin" data-key="dim-${p}-${idx}"></td>`;
      tr.innerHTML = html;
      tbody.appendChild(tr);
    });
  }
}

function onCell(el){
  recalcRow(el.closest('.sheet'), el.dataset.p, el.dataset.r, el.dataset.pt);
}

function recalcRow(sheet, p, r, pt){
  const aEl = sheet.querySelector(`input[data-p="${p}"][data-r="${r}"][data-pt="${pt}"][data-f="A"]`);
  const bEl = sheet.querySelector(`input[data-p="${p}"][data-r="${r}"][data-pt="${pt}"][data-f="B"]`);
  const a = parseFloat(aEl.value), b = parseFloat(bEl.value);
  const avgCell = sheet.querySelector(`[data-key="avg-${p}-${r}-${pt}"]`);
  if(!isNaN(a) && !isNaN(b)){
    avgCell.textContent = ((a+b)/2).toFixed(2);
  } else {
    avgCell.textContent = '';
  }
  recalcTotal(sheet, p, r);
}

function recalcTotal(sheet, p, r){
  const avgs = [];
  for(let pt=1; pt<=3; pt++){
    const v = parseFloat(sheet.querySelector(`[data-key="avg-${p}-${r}-${pt}"]`).textContent);
    if(!isNaN(v)) avgs.push(v);
  }
  const totalCell = sheet.querySelector(`[data-key="total-${p}-${r}"]`);
  const dimCell = sheet.querySelector(`[data-key="dim-${p}-${r}"]`);
  if(avgs.length === 3){
    const total = avgs.reduce((s,v)=>s+v,0)/avgs.length;
    totalCell.textContent = total.toFixed(2);
    const origDia = parseFloat(sheet.querySelector('[data-field="origDia"]').value) || 78;
    const limit = parseFloat(sheet.querySelector('[data-field="limitPct"]').value) || 12;
    const dim = ((origDia - total) / origDia) * 100;
    dimCell.textContent = dim.toFixed(2) + '%';
    if(dim > limit){ dimCell.classList.add('warn'); } else { dimCell.classList.remove('warn'); }
  } else {
    totalCell.textContent = '';
    dimCell.textContent = '';
    dimCell.classList.remove('warn');
  }
}

function recalcAll(sheet){
  for(let p=1; p<=PARTITIONS; p++){
    for(let r=0; r<3; r++){
      for(let pt=1; pt<=3; pt++){
        recalcRow(sheet, p, r, pt);
      }
    }
  }
}

function recalcAllSheets(){
  document.querySelectorAll('.sheet').forEach(s=>recalcAll(s));
}

function clearAllSheets(){
  if(!confirm('هل أنت متأكد من مسح كل القيم المدخلة في كل الصفحات؟')) return;
  document.querySelectorAll('.sheet .cell').forEach(inp=>inp.value='');
  recalcAllSheets();
  saveDataSilent();
}

function addPage(){
  const pagesEl = document.getElementById('pages');
  const pageNum = document.querySelectorAll('.sheet').length + 1;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = sheetTemplate(pageNum).trim();
  const newSheet = wrapper.firstElementChild;
  pagesEl.appendChild(newSheet);
  buildTable(newSheet);
  recalcAll(newSheet);
  newSheet.scrollIntoView({behavior:'smooth', block:'start'});
  scheduleAutosave();
}

function deletePage(btn){
  const sheets = document.querySelectorAll('.sheet');
  if(sheets.length <= 1){ alert('لازم تفضل صفحة واحدة على الأقل'); return; }
  if(!confirm('حذف هذه الصفحة؟')) return;
  btn.closest('.sheet').remove();
  document.querySelectorAll('.sheet').forEach((s,i)=>{
    s.dataset.page = i+1;
    const revCell = s.querySelector('.revtable td');
    if(revCell) revCell.textContent = 'الصفحة رقم ' + (i+1);
  });
  scheduleAutosave();
}

function collectSheetData(sheet){
  const fields = ['vessel','orderNo','orderDate','inspDate','qtyLinks','origDia','limitPct','unit','remarks','qcName','qcDate','ownerName','qcRepName','psCode'];
  const meta = {};
  fields.forEach(f=>{
    const el = sheet.querySelector(`[data-field="${f}"]`);
    if(el) meta[f] = el.value;
  });
  meta.ownerAccept = sheet.querySelector('[data-field="ownerAccept"]').checked;
  meta.qcRepAccept = sheet.querySelector('[data-field="qcRepAccept"]').checked;
  const cells = {};
  sheet.querySelectorAll('.cell').forEach(inp=>{
    if(inp.value !== '') cells[`${inp.dataset.p}-${inp.dataset.r}-${inp.dataset.pt}-${inp.dataset.f}`] = inp.value;
  });
  const logos = [];
  sheet.querySelectorAll('.logo-cell').forEach(cell=>{
    const img = cell.querySelector('img');
    logos.push(img ? img.src : null);
  });
  return {meta, cells, logos};
}

function applySheetData(sheet, data){
  const m = data.meta || {};
  Object.keys(m).forEach(f=>{
    const el = sheet.querySelector(`[data-field="${f}"]`);
    if(!el) return;
    if(el.type === 'checkbox') el.checked = !!m[f];
    else el.value = m[f];
  });
  Object.keys(data.cells || {}).forEach(key=>{
    const [p,r,pt,f] = key.split('-');
    const inp = sheet.querySelector(`input[data-p="${p}"][data-r="${r}"][data-pt="${pt}"][data-f="${f}"]`);
    if(inp) inp.value = data.cells[key];
  });
  const logoCells = sheet.querySelectorAll('.logo-cell');
  (data.logos || []).forEach((src, i)=>{
    if(src && logoCells[i]){
      logoCells[i].querySelector('.logo-box').innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:contain;">`;
    }
  });
  recalcAll(sheet);
}

function saveDataSilent(){
  try{
    const all = Array.from(document.querySelectorAll('.sheet')).map(collectSheetData);
    localStorage.setItem('chainMeasurementData', JSON.stringify(all));
    return true;
  }catch(e){ return false; }
}

function rebuildFromData(all){
  if(!Array.isArray(all) || all.length === 0) return false;
  const pagesEl = document.getElementById('pages');
  pagesEl.innerHTML = '';
  all.forEach((data, i)=>{
    const wrapper = document.createElement('div');
    wrapper.innerHTML = sheetTemplate(i+1).trim();
    const sheet = wrapper.firstElementChild;
    pagesEl.appendChild(sheet);
    buildTable(sheet);
    applySheetData(sheet, data);
  });
  return true;
}

function restoreFromStorage(){
  const raw = localStorage.getItem('chainMeasurementData');
  if(!raw) return false;
  try{
    const all = JSON.parse(raw);
    return rebuildFromData(all);
  }catch(e){ return false; }
}


/* ---- export the form as an image (PNG) or PDF, with a real "Save As" dialog ---- */
function showExportOverlay(show){
  document.getElementById('exportOverlay').style.display = show ? 'flex' : 'none';
}

function setExportButtonsDisabled(disabled){
  const b1 = document.getElementById('btnSaveImg');
  const b2 = document.getElementById('btnSavePdf');
  if(b1) b1.disabled = disabled;
  if(b2) b2.disabled = disabled;
}

/* Hides delete-page buttons and the toolbar so they don't appear in the exported file,
   runs the capture, then restores everything (even if capture throws). */
async function withExportChrome(fn){
  const toolbar = document.querySelector('.toolbar');
  const note = document.querySelector('body > p');
  const delBtns = Array.from(document.querySelectorAll('.delpage'));
  const prevToolbarDisplay = toolbar ? toolbar.style.display : null;
  const prevNoteDisplay = note ? note.style.display : null;
  if(toolbar) toolbar.style.display = 'none';
  if(note) note.style.display = 'none';
  delBtns.forEach(b=> b.style.visibility = 'hidden');
  try{
    return await fn();
  } finally {
    if(toolbar) toolbar.style.display = prevToolbarDisplay || '';
    if(note) note.style.display = prevNoteDisplay || '';
    delBtns.forEach(b=> b.style.visibility = '');
  }
}

async function captureSheetsAsCanvases(){
  const sheets = Array.from(document.querySelectorAll('.sheet'));
  const canvases = [];
  for(const sheet of sheets){
    const canvas = await html2canvas(sheet, {
      scale: 2,
      backgroundColor: '#ffffff',
      useCORS: true
    });
    canvases.push(canvas);
  }
  return canvases;
}

/* Saves a Blob using the native "Save As" file picker when available (lets the user
   pick Desktop or any folder), falling back to a normal browser download otherwise. */
async function saveBlobWithPicker(blob, suggestedName, mimeType, extensionDesc, extList){
  if(window.showSaveFilePicker){
    try{
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types: [{ description: extensionDesc, accept: { [mimeType]: extList } }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return 'saved';
    }catch(err){
      if(err && err.name === 'AbortError') return 'cancelled';
      console.error(err);
      // fall through to download fallback
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = suggestedName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  return 'downloaded';
}

async function saveAsImage(){
  if(typeof html2canvas === 'undefined'){
    alert('أداة تصدير الصورة لسه بتتحمل أو محتاجة إنترنت أول مرة، تأكد من الاتصال وحاول تاني بعد ثواني');
    return;
  }
  setExportButtonsDisabled(true);
  showExportOverlay(true);
  try{
    const canvases = await withExportChrome(captureSheetsAsCanvases);
    if(canvases.length === 0){ alert('لا توجد صفحات لتصديرها'); return; }

    // Stack all pages vertically into a single tall image.
    const gap = 24;
    const width = Math.max(...canvases.map(c=>c.width));
    const totalHeight = canvases.reduce((s,c)=>s + c.height, 0) + gap * (canvases.length - 1);
    const combined = document.createElement('canvas');
    combined.width = width;
    combined.height = totalHeight;
    const ctx = combined.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, width, totalHeight);
    let y = 0;
    canvases.forEach(c=>{
      ctx.drawImage(c, 0, y);
      y += c.height + gap;
    });

    const blob = await new Promise(resolve => combined.toBlob(resolve, 'image/png'));
    const filename = 'chain-measurement-' + new Date().toISOString().slice(0,10) + '.png';
    const result = await saveBlobWithPicker(blob, filename, 'image/png', 'صورة PNG', ['.png']);
    if(result === 'saved') alert('تم حفظ الصورة في المكان اللي اخترته بنجاح');
    else if(result === 'downloaded') alert('جاري تنزيل الصورة — لو المتصفح سألك عن مكان الحفظ اختاره من نافذة التنزيل');
  }catch(e){
    console.error(e);
    alert('تعذر تصدير الصورة: ' + e.message);
  }finally{
    setExportButtonsDisabled(false);
    showExportOverlay(false);
  }
}

async function saveAsPDF(){
  if(typeof html2canvas === 'undefined' || !window.jspdf){
    alert('أداة تصدير الـ PDF لسه بتتحمل أو محتاجة إنترنت أول مرة، تأكد من الاتصال وحاول تاني بعد ثواني');
    return;
  }
  setExportButtonsDisabled(true);
  showExportOverlay(true);
  try{
    const canvases = await withExportChrome(captureSheetsAsCanvases);
    if(canvases.length === 0){ alert('لا توجد صفحات لتصديرها'); return; }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 6;

    canvases.forEach((canvas, i)=>{
      if(i > 0) pdf.addPage();
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      const maxW = pageW - margin * 2;
      const maxH = pageH - margin * 2;
      const ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
      const w = canvas.width * ratio;
      const h = canvas.height * ratio;
      const x = (pageW - w) / 2;
      const y = (pageH - h) / 2;
      pdf.addImage(imgData, 'JPEG', x, y, w, h);
    });

    const blob = pdf.output('blob');
    const filename = 'chain-measurement-' + new Date().toISOString().slice(0,10) + '.pdf';
    const result = await saveBlobWithPicker(blob, filename, 'application/pdf', 'ملف PDF', ['.pdf']);
    if(result === 'saved') alert('تم حفظ ملف الـ PDF في المكان اللي اخترته بنجاح');
    else if(result === 'downloaded') alert('جاري تنزيل ملف الـ PDF — لو المتصفح سألك عن مكان الحفظ اختاره من نافذة التنزيل');
  }catch(e){
    console.error(e);
    alert('تعذر تصدير الـ PDF: ' + e.message);
  }finally{
    setExportButtonsDisabled(false);
    showExportOverlay(false);
  }
}

let autosaveTimer = null;
function scheduleAutosave(){
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(saveDataSilent, 400);
}
document.addEventListener('input', (e)=>{ if(e.target.closest('.sheet')) scheduleAutosave(); });
document.addEventListener('change', (e)=>{ if(e.target.closest('.sheet')) scheduleAutosave(); });
window.addEventListener('beforeunload', saveDataSilent);

function initFirstPage(){
  if(restoreFromStorage()) return;
  const pagesEl = document.getElementById('pages');
  const wrapper = document.createElement('div');
  wrapper.innerHTML = sheetTemplate(1).trim();
  const sheet = wrapper.firstElementChild;
  pagesEl.appendChild(sheet);
  buildTable(sheet);
  recalcAll(sheet);
}

initFirstPage();
